<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Math Pocket</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap');

    :root {
      --ink: #1f2430;
      --muted: #5c6476;
      --paper: #ffffff;
      --line: #d7deea;
      --brand: #0f4ca6;
      --brand-2: #f0642b;
      --brand-soft: #eef4ff;
      --glow: rgba(15, 76, 166, 0.14);
      --bg-1: #fff8ef;
      --bg-2: #eef5ff;
      --bg-3: #f7fbf7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background:
        radial-gradient(1200px 700px at -10% -15%, rgba(240, 100, 43, 0.16), transparent 60%),
        radial-gradient(900px 550px at 110% -20%, rgba(15, 76, 166, 0.16), transparent 60%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2) 55%, var(--bg-3));
      padding: 28px 24px 44px;
    }

    header {
      max-width: 1100px;
      margin: 0 auto;
      padding: 22px 24px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.7));
      box-shadow: 0 16px 36px rgba(17, 27, 48, 0.12);
      backdrop-filter: blur(6px);
      animation: riseIn .7s ease both;
    }

    header h1 {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      letter-spacing: .02em;
      font-size: clamp(1.8rem, 2.6vw, 2.6rem);
      color: #0f356f;
    }

    header p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .guide-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .guide-chip {
      border-radius: 999px;
      background: #f3f7ff;
      border: 1px solid #d6e3ff;
      color: #264273;
      font-size: .82rem;
      padding: 5px 9px;
      font-weight: 700;
    }

    main {
      max-width: 1100px;
      margin: 24px auto 0;
    }

    #problems {
      width: 100%;
      display: block;
    }

    .difficulty-section {
      position: relative;
      margin-top: 34px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.8));
      box-shadow: 0 10px 24px rgba(18, 37, 74, 0.1);
      padding: 22px 18px 18px;
      animation: riseIn .55s ease both;
    }

    .difficulty-section-title {
      position: absolute;
      top: -14px;
      left: 16px;
      background: linear-gradient(135deg, var(--brand), #2966c2);
      color: #fff;
      padding: 5px 12px;
      border-radius: 999px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: .92rem;
      letter-spacing: .04em;
      box-shadow: 0 8px 16px var(--glow);
    }

    .difficulty-section .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      width: 100%;
      margin-top: 8px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--paper);
      box-shadow: 0 6px 14px rgba(15, 29, 58, 0.08);
      cursor: pointer;
      min-width: 0;
      overflow: hidden;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      animation: cardIn .45s ease both;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #bfd0f6;
      box-shadow: 0 14px 24px rgba(15, 76, 166, 0.18);
    }

    .card img {
      display: block;
      width: 100%;
      height: 132px;
      object-fit: contain;
      background: linear-gradient(160deg, #f6f9ff, #fefefe);
      border-bottom: 1px solid #e9eef8;
      padding: 8px;
    }

    .card h3 {
      margin: 0;
      padding: 11px 10px 12px;
      text-align: center;
      font-size: .97rem;
      color: #22355f;
      letter-spacing: .01em;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(17, 24, 39, 0.42);
      backdrop-filter: blur(4px);
      padding: 18px;
      z-index: 100;
    }

    .hidden { display: none; }

    .panel {
      width: min(560px, 100%);
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      border: 1px solid #e2eaf8;
      padding: 18px;
      border-radius: 18px;
      box-shadow: 0 24px 42px rgba(16, 34, 66, 0.22);
      animation: riseIn .28s ease both;
    }

    .panel h2 {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      color: #16366e;
      letter-spacing: .02em;
    }

    #result-value {
      margin: 14px 0 0;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: .02em;
      color: #0f4ca6;
      line-height: 1.05;
      text-shadow: 0 10px 20px rgba(15, 76, 166, 0.16);
      word-break: break-word;
    }

    #result-meta {
      margin: 12px 0 14px;
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--brand-soft);
      border: 1px solid #dbe7ff;
      line-height: 1.55;
      color: #24416e;
      font-size: .95rem;
      word-break: break-word;
    }

    .numbers {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin: 14px 0 10px;
    }

    .numbers button {
      height: 42px;
      border-radius: 10px;
      border: 1px solid #cfd9ee;
      background: #fff;
      color: #1f2f53;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      transition: transform .14s ease, background .14s ease, color .14s ease, border-color .14s ease;
      appearance: none;
    }

    .numbers button:hover {
      transform: translateY(-1px);
      border-color: #9cb8f1;
      background: #f1f6ff;
      color: #0f4ca6;
    }

    button {
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--brand), #2a69c7);
      color: #fff;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: .02em;
    }

    button#cancel {
      background: linear-gradient(135deg, #eef2f9, #e3e9f5);
      color: #2b3b5e;
      border: 1px solid #d0daec;
      margin-top: 6px;
    }

    #close-result {
      background: linear-gradient(135deg, var(--brand-2), #f37a34);
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(6px) scale(.99); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 980px) {
      .difficulty-section .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .numbers {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      body { padding: 16px 12px 24px; }
      header { padding: 16px 14px; border-radius: 14px; }
      main { margin-top: 14px; }
      .difficulty-section {
        margin-top: 26px;
        border-radius: 14px;
        padding: 20px 10px 12px;
      }
      .difficulty-section-title {
        left: 10px;
        top: -12px;
        font-size: .82rem;
      }
      .difficulty-section .grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .card img { height: 122px; }
      .numbers { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <h1>Math Pocket</h1>
    <p>問題を選んで、1～13の値を代入して答えを表示します。</p>
    <div class="guide-row">
      <span class="guide-chip">1. 問題カードを選択</span>
      <span class="guide-chip">2. 数字 1〜13 を選択</span>
      <span class="guide-chip">3. 結果を確認</span>
    </div>
  </header>

  <main>
    <section id="problems"></section>
  </main>

  <div id="selector" class="overlay hidden">
    <div class="panel">
      <h2 id="sel-title">選択</h2>
      <div id="numbers" class="numbers"></div>
      <button id="cancel">キャンセル</button>
    </div>
  </div>

  <div id="result" class="overlay hidden">
    <div class="panel">
      <h2>結果</h2>
      <p id="result-value">-</p>
      <p id="result-meta"></p>
      <button id="close-result">閉じる</button>
    </div>
  </div>

  <script>
const problems = [
  {id:1, title:'問題1', expr:'x+1', img:'easy-a/x+1.png', difficulty:'易a'},
  {id:2, title:'問題2', expr:'x*x + 1', img:'easy-a/x^2+1.png', difficulty:'易a'},
  {id:3, title:'問題3', expr:'2*x + 3', img:'easy-a/2x+3.png', difficulty:'易a'},
  {id:4, title:'問題4', expr:'x/4 + 2', img:'easy-a/4x+2.png', difficulty:'易a'},
  {id:5, title:'問題5', expr:'x*x - 4*x + 4', img:'easy-a/x^2-4x+4.png', difficulty:'易a'},
  {id:6, title:'問題6', expr:'x*x*x', img:'easy-a/x^3.png', difficulty:'易a'},
  {id:7, title:'問題1', expr:'x+3', img:'easy-b/x+3.png', difficulty:'易b'},
  {id:8, title:'問題2', expr:'x*x - 5', img:'easy-b/x^2-5.png', difficulty:'易b'},
  {id:9, title:'問題3', expr:'3*x - 5', img:'easy-b/3x-5.png', difficulty:'易b'},
  {id:10, title:'問題4', expr:'x/4 - 1', img:'easy-b/4x-1.png', difficulty:'易b'},
  {id:11, title:'問題5', expr:'x*x - 4*x + 4', img:'easy-b/x^2-4x+4.png', difficulty:'易b'},
  {id:12, title:'問題6', expr:'x*x*x+1', img:'easy-b/x^3+1.png', difficulty:'易b'},
  {id:13, title:'問題1', expr:'(3*x - 5)/(2*x - 1)/(x + 1)', img:'common/3x-5|(2x-1)(x+1).png', difficulty:'普通'},
  {id:14, title:'問題2', expr:'x*x*x - x*x', img:'common/x^3-x^2.png', difficulty:'普通'},
  {id:15, title:'問題3', expr:'sqrt(4*x)', img:'common/|^4x.png', difficulty:'普通'},
  {id:16, title:'問題4', expr:'(x-1)*(x-1)*(x-3)', img:'common/(x-1)^2(x-3).png', difficulty:'普通'},
  {id:17, title:'問題5', expr:'(x-7)*(x-7)*(x-7)', img:'common/(x-7)^3.png', difficulty:'普通'},
  {id:18, title:'問題6', expr:'abs(x*x - 100)', img:'common/|x^2-100|.png', difficulty:'普通'},
  {id:19, title:'問題1', expr:'2**(x-5) + 4*x + 3', img:'difficult/2^(x-5)+4x+3.png', difficulty:'難'},
  {id:20, title:'問題2', expr:'x**3 / 3 + 7*x', img:'difficult/∫(x^2-7)dx.png', difficulty:'難'},
  {id:21, title:'問題3', expr:'-(x-1)*(x-1)*(x-4)', img:'difficult/-(x-1)^2(x-4).png', difficulty:'難'},
  {id:22, title:'問題4', expr:'x**3 + x + 1', img:'difficult/(x+1)!|x!+x^3.png', difficulty:'難'},
  {id:23, title:'問題5', expr:'(5*x + 6)/(x + 2)', img:'difficult/3(x|(1+x|2)).png', difficulty:'難'},
  {id:24, title:'問題6', expr:'(x + 1) * x / 2', img:'difficult/(x+1)C(x-1).png', difficulty:'難'}
];

const problemsEl = document.getElementById('problems');
const selector = document.getElementById('selector');
const numbersEl = document.getElementById('numbers');
const selTitle = document.getElementById('sel-title');
const cancelBtn = document.getElementById('cancel');
const resultEl = document.getElementById('result');
const resultValue = document.getElementById('result-value');
const resultMeta = document.getElementById('result-meta');
const closeResultBtn = document.getElementById('close-result');

let currentProblem = null;

// === Fraction utility ===
class Fraction{
  constructor(n,d=1){
    n = Number(n); d = Number(d);
    if(!Number.isFinite(n) || !Number.isFinite(d)) throw new Error('Invalid fraction');
    if(d===0) throw new Error('Division by zero');
    if(d<0){ n=-n; d=-d }
    this.n = Math.trunc(n);
    this.d = Math.trunc(d);
    this._reduce();
  }
  _gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){[a,b]=[b,a%b]} return a }
  _reduce(){ const g=this._gcd(this.n,this.d); if(g>1){ this.n/=g; this.d/=g } }
  isInteger(){ return this.d === 1 }
  add(o){ return new Fraction(this.n*o.d + o.n*this.d, this.d*o.d) }
  sub(o){ return new Fraction(this.n*o.d - o.n*this.d, this.d*o.d) }
  mul(o){ return new Fraction(this.n*o.n, this.d*o.d) }
  div(o){ if(o.n===0) throw new Error('Division by zero'); return new Fraction(this.n*o.d, this.d*o.n) }
  powInt(exp){
    if(!Number.isInteger(exp)) throw new Error('分数のべき乗は整数指数のみ対応しています');
    if(exp === 0) return new Fraction(1,1);
    if(exp > 0) return new Fraction(this.n ** exp, this.d ** exp);
    const p = -exp;
    return new Fraction(this.d ** p, this.n ** p);
  }
  factorial(){
    if(!this.isInteger()) throw new Error('階乗は整数にのみ対応しています');
    if(this.n < 0) throw new Error('階乗は0以上の整数にのみ対応しています');
    let result = 1;
    for(let i = 2; i <= this.n; i += 1){
      result *= i;
    }
    return new Fraction(result, 1);
  }
  toString(){ return this.d===1? String(this.n) : `${this.n}/${this.d}` }
}

// === Expression evaluation (tokenize -> shunting-yard -> RPN eval) ===
function tokenize(expr){
  const tokens = [];
  const normalized = expr.replace(/\^/g, '**');
  // support numbers, variable x, identifiers (functions), parentheses, operators, factorial
  const re = /\s*(\*\*|[0-9]+|x|[a-zA-Z_][a-zA-Z0-9_]*|\(|\)|\+|\-|\*|\/|!)/g;
  let m; let prev = null;
  while((m = re.exec(normalized)) !== null){
    let t = m[1];
    // handle unary minus: if '-' and previous is null or one of ( '(', '+','-','*','/', ',' )
    if(t === '-' && (prev === null || ['(','+','-','*','/','**','!',','].includes(prev))){
      tokens.push('0');
    }
    tokens.push(t);
    prev = t;
  }
  return tokens;
}

function toRPN(tokens){
  const out = []; const ops = [];
  const prec = {'+':1,'-':1,'*':2,'/':2,'**':3};
  const rightAssoc = {'**': true};
  const isIdentifier = t => /^[a-zA-Z_][a-zA-Z0-9_]*$/.test(t);
  for(const t of tokens){
    if(/^[0-9]+$/.test(t) || t==='x'){
      out.push(t);
    }else if(t === '!'){
      // factorial is a postfix operator, push to output directly
      out.push(t);
    }else if(isIdentifier(t)){
      // function name -> push onto operator stack
      ops.push(t);
    }else if(t in prec){
      while(
        ops.length &&
        ops[ops.length-1] !== '(' &&
        (ops[ops.length-1] in prec) &&
        (rightAssoc[t] ? prec[ops[ops.length-1]] > prec[t] : prec[ops[ops.length-1]] >= prec[t])
      ){
        out.push(ops.pop());
      }
      ops.push(t);
    }else if(t === '('){ ops.push(t);
    }else if(t === ')'){
      while(ops.length && ops[ops.length-1] !== '(') out.push(ops.pop());
      ops.pop();
      // if function on top, pop it to output
      if(ops.length && isIdentifier(ops[ops.length-1])) out.push(ops.pop());
    }
  }
  while(ops.length) out.push(ops.pop());
  return out;
}

function evalRPN(rpn, xValue){
  const stack = [];
  const xFrac = new Fraction(xValue,1);
  for(const t of rpn){
    if(/^[0-9]+$/.test(t)) stack.push(new Fraction(Number(t),1));
    else if(t === 'x') stack.push(xFrac);
    else if(t === '!'){
      const a = stack.pop();
      if(!a) throw new Error('Invalid expression');
      if(a instanceof Fraction) stack.push(a.factorial());
      else throw new Error('階乗は整数にのみ対応しています');
    }else if(['sqrt','abs'].includes(t)){
      const a = stack.pop();
      if(!a) throw new Error('Invalid expression');
      if(a instanceof Fraction){
        if(t === 'abs'){
          const n = Math.abs(a.n);
          stack.push(new Fraction(n, a.d));
        }else if(t === 'sqrt'){
          if(a.n < 0) throw new Error('平方根の被演算子が負です');
          const sn = Math.sqrt(a.n);
          const sd = Math.sqrt(a.d);
          if(Number.isInteger(sn) && Number.isInteger(sd)){
            stack.push(new Fraction(sn, sd));
          }else{
            stack.push(Math.sqrt(a.n / a.d));
          }
        }
      }else{
        if(t === 'abs') stack.push(Math.abs(a));
        else stack.push(Math.sqrt(a));
      }
    }else if(['+','-','*','/','**'].includes(t)){
      const b = stack.pop(); const a = stack.pop();
      if(a===undefined || b===undefined) throw new Error('Invalid expression');
      if(a instanceof Fraction && b instanceof Fraction){
        let r;
        if(t === '+') r = a.add(b);
        if(t === '-') r = a.sub(b);
        if(t === '*') r = a.mul(b);
        if(t === '/') r = a.div(b);
        if(t === '**'){
          if(!b.isInteger()) throw new Error('指数は整数で指定してください');
          r = a.powInt(b.n);
        }
        stack.push(r);
      }else{
        const an = (a instanceof Fraction) ? (a.n / a.d) : a;
        const bn = (b instanceof Fraction) ? (b.n / b.d) : b;
        let r;
        if(t === '+') r = an + bn;
        if(t === '-') r = an - bn;
        if(t === '*') r = an * bn;
        if(t === '/') r = an / bn;
        if(t === '**') r = an ** bn;
        stack.push(r);
      }
    }else{
      throw new Error('Unknown token: ' + t);
    }
  }
  if(stack.length !== 1) throw new Error('Invalid expression evaluation');
  return stack[0];
}

function evaluateAsFraction(expr, x){
  const tokens = tokenize(expr);
  const rpn = toRPN(tokens);
  return evalRPN(rpn, x);
}

function formatRounded2(value){
  if(!Number.isFinite(value)) return String(value);
  const rounded = Math.round(value * 100) / 100;
  const safe = Object.is(rounded, -0) ? 0 : rounded;
  return safe.toFixed(2);
}

function renderProblems(){
  problemsEl.innerHTML = '';
  const difficulties = ['易a', '易b', '普通', '難'];
  difficulties.forEach(diff => {
    const filtered = problems.filter(p => p.difficulty === diff);
    if(filtered.length > 0){
      const section = document.createElement('div');
      section.className = 'difficulty-section';
      section.style.paddingTop = '24px';
      const title = document.createElement('div');
      title.className = 'difficulty-section-title';
      title.textContent = diff;
      section.appendChild(title);
      const grid = document.createElement('div');
      grid.className = 'grid';
      filtered.forEach((p, idx) => {
        const card = document.createElement('div');
        card.className='card';
        card.style.animationDelay = `${idx * 35}ms`;
        card.innerHTML = `<img src="${p.img}" alt="${p.title}"><h3>${p.title}</h3>`;
        card.addEventListener('click', ()=>openSelector(p));
        grid.appendChild(card);
      });
      section.appendChild(grid);
      problemsEl.appendChild(section);
    }
  });
}

function openSelector(problem){
  currentProblem = problem;
  selTitle.textContent = `${problem.title} — 数字を選んでください`;
  numbersEl.innerHTML = '';
  for(let i=1;i<=13;i++){
    const b = document.createElement('button');
    b.textContent = i;
    b.addEventListener('click', ()=>onNumberSelect(i));
    numbersEl.appendChild(b);
  }
  selector.classList.remove('hidden');
}

function onNumberSelect(n){
  selector.classList.add('hidden');
  if(!currentProblem) return;
  let valueStr = '';
  let metaText = '';
  try{
    const result = evaluateAsFraction(currentProblem.expr, n);
    if(result instanceof Fraction){
      valueStr = result.toString();
      metaText = `小数: ${formatRounded2(result.n / result.d)}`;
    }else{
      // sqrt などで無理数になる場合は小数第2位まで表示
      valueStr = formatRounded2(result);
      metaText = '';
    }
  }catch(e){
    valueStr = '計算エラー';
    metaText = e.message;
  }
  resultValue.textContent = valueStr;
  resultMeta.textContent = metaText;
  resultMeta.style.display = metaText ? 'block' : 'none';
  resultEl.classList.remove('hidden');
}

cancelBtn.addEventListener('click', ()=>{selector.classList.add('hidden'); currentProblem=null});
closeResultBtn.addEventListener('click', ()=>{resultEl.classList.add('hidden'); currentProblem=null});

renderProblems();
  </script>
</body>
</html>
